name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # required for NuGet trusted publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build the embedded SPA so the package's wwwroot matches source at this tag.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SPA
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Winche.Console.slnx

      - name: Build
        run: dotnet build Winche.Console.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Winche.Console/Winche.Console.csproj -c Release --no-build -o ./packages

      # Exchange the GitHub OIDC token for a short-lived NuGet.org API key.
      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: FlameOfUdun

      - name: Push
        run: |
          dotnet nuget push "./packages/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
          dotnet nuget push "./packages/*.snupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
